name: Cleanup PR
'on':
  workflow_dispatch:
    inputs:
      pr_number:
        type: number
        required: true
        description: Pull request number
jobs:
  cleanup-pr:
    name: Remove cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
      with:
        disable-sudo: true
        egress-policy: audit
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
        ref: main
    - name: Setup GCP
      id: gcp
      uses: hoprnet/hopr-workflows/actions/setup-gcp@12c56020e16036982e6cc529848edeedfc705865
      with:
        google-credentials: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
        login-artifact-registry: 'true'
        install-sdk: 'true'
    - name: Cleanup Github pipeline cache
      run: "cacheKeysForPR=($(gh actions-cache list -R ${{ github.repository }} -B\
        \ refs/pull/${{ github.event.inputs.pr_number }}/merge | cut -f 1 | tr '\\\
        n' ' '))\nfor cacheKey in $cacheKeysForPR\ndo\n  gh actions-cache delete $cacheKey\
        \ -R hoprnet/contracts -B refs/pull/${{ github.event.inputs.pr_number }}/merge\
        \ --confirm\ndone\n"
